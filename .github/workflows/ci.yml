name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify Android vertical slice
        run: |
          status=0
          apps/android/gradlew -p apps/android testDebugUnitTest lintDebug assembleDebug || status=$?
          if [ "$status" -ne 0 ]; then
            find apps/android -type f -name "lint-results-*.txt" -print -exec cat {} \;
          fi
          exit "$status"
