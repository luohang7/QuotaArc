name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify Android debug, Glance tests, lint, and minified release
        run: bash scripts/verify-android.sh

  android-workmanager:
    needs: android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Enable KVM for the Gradle managed device
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' |
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install build and emulator SDK packages
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "emulator" \
            "system-images;android-34;default;x86_64"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run WorkManager TestDriver integration test
        run: |
          apps/android/gradlew \
            -p apps/android \
            :widget:pixel2Api34DebugAndroidTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --stacktrace

      - name: Upload managed-device test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workmanager-managed-device-reports
          path: |
            apps/android/widget/build/reports/androidTests/
            apps/android/widget/build/outputs/androidTest-results/
          if-no-files-found: warn
